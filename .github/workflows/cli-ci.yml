name: CLI CI

on:
  push:
    paths:
      - 'packages/insentek-skill-cli/**'
      - 'SKILL.md'
      - 'skill.json'
      - 'docs/**'
      - 'reference/**'
      - 'examples/**'
      - 'scripts/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'packages/insentek-skill-cli/**'
      - 'SKILL.md'
      - 'skill.json'
      - 'docs/**'
      - 'reference/**'
      - 'examples/**'
      - 'scripts/**'
      - '.github/workflows/cli-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/insentek-skill-cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync skill assets
        run: npm run sync-assets

      - name: Run tests
        run: npm test
