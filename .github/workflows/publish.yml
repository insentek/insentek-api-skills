name: Production Release to ClawHub

on:
  release:
    types: [published]     # 当你在 GitHub 成功发布一个 Release 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Authenticate
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Extract Tag Version and Publish
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # 将 GitHub 的 tag（如 v1.2.3）去掉开头的 'v'，变成标准的 SemVer 格式（1.2.3）
          VERSION=$(echo "$RELEASE_TAG" | sed 's/^v//')

          clawhub publish . \
            --slug "insentek-openapi" \
            --name "insentek-openapi" \
            --version "$VERSION" \
            --changelog "$RELEASE_BODY"

      - name: Notify DingTalk
        if: always()
        env:
          DING_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 <<'EOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          token = os.environ.get("DING_TOKEN", "")
          if not token:
              print("DINGTALK_ACCESS_TOKEN not set, skip notify")
              sys.exit(0)

          status = os.environ.get("JOB_STATUS", "unknown")
          status_emoji = "🟢 成功" if status == "success" else "🔴 失败"
          tag = os.environ.get("RELEASE_TAG", "")
          actor = os.environ.get("ACTOR", "")
          run_url = os.environ.get("RUN_URL", "")
          changelog = os.environ.get("RELEASE_BODY") or "_无更新日志_"

          text = f"""### ClawHub 部署结果通知：{status_emoji}
          - **项目名称**: insentek-openapi
          - **版本号**: {tag}
          - **触发人**: {actor}
          - **构建详情**: [点击查看 GitHub Action]({run_url})

          ---
          {changelog}"""

          body = {
              "msgtype": "markdown",
              "markdown": {
                  "title": "ClawHub 部署结果通知",
                  "text": text,
              },
          }

          webhook = f"https://oapi.dingtalk.com/robot/send?access_token={token}"
          req = urllib.request.Request(
              webhook,
              data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  print(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              print(f"DingTalk notify failed: {e.code} {e.reason}")
              print(e.read().decode("utf-8"))
              sys.exit(1)
          EOF