name: Production Release to ClawHub

on:
  release:
    types: [published]     # 当你在 GitHub 成功发布一个 Release 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Authenticate
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Extract Tag Version and Publish
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # 将 GitHub 的 tag（如 v1.2.3）去掉开头的 'v'，变成标准的 SemVer 格式（1.2.3）
          VERSION=$(echo "$RELEASE_TAG" | sed 's/^v//')

          clawhub publish . \
            --slug "insentek-api-skill" \
            --name "insentek-api-skill" \
            --version "$VERSION" \
            --changelog "$RELEASE_BODY"