name: Production Release to ClawHub

on:
  release:
    types: [published]     # 当你在 GitHub 成功发布一个 Release 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Authenticate
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}

      - name: Extract Tag Version and Publish
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # 将 GitHub 的 tag（如 v1.2.3）去掉开头的 'v'，变成标准的 SemVer 格式（1.2.3）
          VERSION=$(echo "$RELEASE_TAG" | sed 's/^v//')

          clawhub publish . \
            --slug "insentek-api-skill" \
            --name "insentek-api-skill" \
            --version "$VERSION" \
            --changelog "$RELEASE_BODY"

      # === 新增：带有 Changelog 的钉钉通知步骤 ===
      - name: Notify DingTalk
        if: always() 
        uses: ModulesMarv/dingtalk-action@v1
        with:
          # 在 GitHub 仓库 Secrets 中配置的钉钉 Token 和 加签密钥
          token: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          secret: ${{ secrets.DINGTALK_SECRET }}
          status: ${{ job.status }}
          notifyType: async
          title: "ClawHub 部署结果通知"
          # text 内部支持标准的 Markdown 语法
          text: |
            ### ClawHub 部署状态: ${{ job.status == 'success' && '🟢 成功' || '🔴 失败' }}
            - **项目名称**: insentek-api-skill
            - **版本号**: ${{ github.event.release.tag_name }}
            - **触发人**: ${{ github.actor }}
            - **构建详情**: [点击查看 GitHub Action](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ---
            ### 📝 更新日志 (Changelog):
            ${{ github.event.release.body }}